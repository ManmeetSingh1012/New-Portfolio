name: Deploy App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
    uses: appleboy/ssh-action@v1.0.3
  with:
    host: 72.60.218.93
    username: dev
    key: ${{ secrets.SSH_KEY }}
    port: 22
    script: |
      cd /var/www/portfolio/New-Portfolio
      git pull origin main
      npm install
      npm run build
      pm2 restart all
